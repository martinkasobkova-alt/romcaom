<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt | Beyond Limits</title>
<meta name="description" content="Napište mi. Konzultace, meditace, program 40 dní, nebo jen dotaz — ráda se spojím.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body data-page="contact" data-lang="cs">

<div id="nav-slot"></div>

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">✦ Pojďme v kontaktu</span>
    <h1>Napište mi</h1>
    <p>Ptáte se na něco, chcete začít cestu 40 dní, nebo hledáte konzultaci — jsem tady. Obvykle odpovídám do 48 hodin.</p>
  </div>
</section>

<section class="journey reveal">
  <div class="container">
    <div class="contact-wrap">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Jméno</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="topic">Co vás zajímá?</label>
          <input type="text" id="topic" name="topic" placeholder="Program 40 dní, konzultace, meditace, retreat…">
        </div>
        <div class="form-group">
          <label for="message">Zpráva</label>
          <textarea id="message" name="message" placeholder="Napište, co vás těží. Klidně stručně." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Odeslat zprávu</button>
        <p class="form-thanks" style="display:none; margin-top: 1.5rem; padding: 1rem; background: var(--color-lime); border-radius: var(--radius-sm); color: var(--color-ink);">
          ✦ Děkujeme. Ozveme se vám v co nejkratší době (obvykle do 48 hodin).
        </p>
      </form>

      <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid rgba(43,35,64,0.08); text-align: center;">
        <p style="font-size: 0.95rem; color: var(--color-ink-soft); margin-bottom: 0.5rem;">Nebo přímo:</p>
        <p style="font-size: 1.1rem;">
          <a href="mailto:beyondlimitscz@gmail.com" style="border-bottom: 1.5px solid var(--color-lime-bright); padding-bottom: 2px; color: var(--color-ink);">beyondlimitscz@gmail.com</a>
        </p>
        <div style="margin-top: 2rem; font-size: 0.9rem; color: var(--color-ink-soft); line-height: 1.8;">
          S láskou,<br>
          <strong style="color: var(--color-ink);">Romana Anuradha</strong> 🍀🌞❤️
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="/script.js"></script>
</body>
</html>
