<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Beyond Limits</title>
<meta name="description" content="Texty, meditace a zápisky od Anuradhy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body data-page="blog" data-lang="cs">

<div id="nav-slot"></div>

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">✦ Myšlenky z cesty</span>
    <h1>Blog</h1>
    <p>Texty, co vznikají na cestě. O bhakti, meditaci, přírodě, službě a hledání radosti. Někdy vážně, někdy hravě. Vždycky od srdce.</p>
  </div>
</section>

<section class="journey reveal">
  <div class="container">
    <div class="blog-grid" id="blog-site-list" aria-live="polite">
      <p class="blog-loading" style="grid-column:1/-1; text-align:center; color: var(--color-ink-soft)">Načítám…</p>
    </div>

    <template id="blog-fallback-cards">
      <a href="/cs/blog?slug=welcome" class="blog-card">
        <div class="blog-image" style="background-image: url('https://anuradha.blog/wp-content/uploads/2025/07/photo_2025-07-29_15-42-17.jpg')"></div>
        <div class="blog-content">
          <div class="blog-meta">Tento web · Úvod</div>
          <h3>Vítejte u Beyond Limits</h3>
          <p>Nový domov pro moje texty, služby a 40denní cestu.</p>
          <span class="blog-card-link">Přečíst článek →</span>
        </div>
      </a>
    </template>

  </div>
</section>

<section class="newsletter-inline reveal">
  <div class="container">
    <div class="newsletter-inline-inner">
      <h3>Newsletter</h3>
      <p>Pošlu vám občas nový text. Jen když bude stát za to.</p>
      <form class="newsletter-form">
        <input type="email" placeholder="Váš e-mail" required>
        <button type="submit" class="btn btn-primary">Odebírat</button>
      </form>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="/script.js"></script>
<script type="module" src="/js/blog-list.js"></script>
</body>
</html>
