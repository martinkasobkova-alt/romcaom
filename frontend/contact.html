<body data-page="contact">

<div id="nav-slot"></div>

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">✦ Let's connect</span>
    <h1>Write to me</h1>
    <p>Whether you have a question, want to start the 40-day journey, or are looking for a consultation — I'm here. I usually reply within 48 hours.</p>
  </div>
</section>

<section class="journey reveal">
  <div class="container">
    <div class="contact-wrap">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="topic">What interests you?</label>
          <input type="text" id="topic" name="topic" placeholder="40-day journey, consultation, meditation, travel retreat&hellip;">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Share what's on your heart. Short is fine." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send message</button>
        <p class="form-thanks" style="display:none; margin-top: 1.5rem; padding: 1rem; background: var(--color-lime); border-radius: var(--radius-sm); color: var(--color-ink);">
          ✦ Thank you. I'll get back to you within 48 hours.
        </p>
      </form>

      <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid rgba(43,35,64,0.08); text-align: center;">
        <p style="font-size: 0.95rem; color: var(--color-ink-soft); margin-bottom: 0.5rem;">Or directly:</p>
        <p style="font-size: 1.1rem;">
          <a href="mailto:beyondlimitscz@gmail.com" style="border-bottom: 1.5px solid var(--color-lime-bright); padding-bottom: 2px; color: var(--color-ink);">beyondlimitscz@gmail.com</a>
        </p>
        <div style="margin-top: 2rem; font-size: 0.9rem; color: var(--color-ink-soft); line-height: 1.8;">
          With love,<br>
          <strong style="color: var(--color-ink);">Romana Anuradha</strong> 🍀🌞❤️
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="script.js"></script>
</body>
